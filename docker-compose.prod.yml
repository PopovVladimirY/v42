# V.42 Production Stack
# ---------------------
# One command: docker compose -f docker-compose.prod.yml up -d
#
# Includes:
#   postgres   -- database
#   migrate    -- runs all migrations then exits
#   api        -- Go backend (port not exposed -- nginx proxies it)
#   frontend   -- Vite/React served by nginx (port 80)
#
# Optional:
#   seed       -- loads demo data via the API (run once with --profile seed)
#                 docker compose -f docker-compose.prod.yml --profile seed up seed
#
# Prerequisites: copy .env.dist to .env and fill in secrets.

services:

  # ----------------------------------------------------------------
  # Database
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Schema migrations (one-shot -- exits 0 when done)
  # ----------------------------------------------------------------
  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: >
      -database postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=${DB_SSL_MODE:-disable}
      -path /migrations up
    restart: on-failure

  # ----------------------------------------------------------------
  # Go API backend
  # ----------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      # Override to reach postgres container by name, not localhost
      DB_HOST: postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-8080}/api/v1/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Frontend: React SPA + nginx reverse proxy
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8042}:80"
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Demo seed (optional, run once with --profile seed)
  # docker compose -f docker-compose.prod.yml --profile seed up seed
  # ----------------------------------------------------------------
  seed:
    image: python:3.12-alpine
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    working_dir: /scripts
    command: >
      sh -c "python seed_demo.py --base-url http://api:${SERVER_PORT:-8080}"
    profiles:
      - seed
    restart: "no"

volumes:
  postgres_data:
